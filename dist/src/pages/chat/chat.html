        <a href="../leaderboard/leaderboard.html" class="nav-item">

          </svg>
          Logout
        </button>

    <!-- ── Main Area ── -->
    <div class="main-wrapper">

      <!-- Topbar -->
      <header class="topbar" id="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle btn-ghost" id="sidebar-toggle" aria-label="Toggle sidebar" aria-expanded="false">
            <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20" aria-hidden="true">
              <path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/>
            </svg>
          </button>
          <h1 class="topbar-title">Chat</h1>
        </div>
        <div class="topbar-right">
          <button class="topbar-icon-btn" id="notification-btn" aria-label="Notifications">
            <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20" aria-hidden="true">
              <path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zm0 16a2 2 0 01-2-2h4a2 2 0 01-2 2z"/>
            </svg>
            <span class="notification-badge" id="notification-badge" style="display:none"></span>
          </button>
          <button class="topbar-avatar" id="avatar-btn" aria-label="User menu">
            <img src="" alt="User avatar" id="user-avatar" width="32" height="32" />
            <span class="avatar-fallback" id="avatar-fallback" aria-hidden="true">U</span>
          </button>
        </div>
      </header>

      <!-- Chat Layout -->
      <div class="chat-layout" id="chat-layout">

        <!-- Conversations Panel -->
        <div class="conversations-panel" id="conversations-panel">
          <div class="conversations-header">
            <h2 class="conversations-title">Messages</h2>
          </div>
          <div class="conversations-search">
            <div class="search-input-wrap">
              <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor" width="16" height="16" aria-hidden="true">
                <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
              </svg>
              <input
                type="search"
                class="search-input"
                id="conversation-search"
                placeholder="Search conversations…"
                aria-label="Search conversations"
              />
            </div>
          </div>
          <div id="conversations-list" class="conversations-list" aria-label="Conversations" role="list">
            <!-- Skeleton loading -->
            <div class="conv-skeleton">
              <div class="skeleton conv-skeleton-item"></div>
              <div class="skeleton conv-skeleton-item"></div>
              <div class="skeleton conv-skeleton-item"></div>
            </div>
          </div>
        </div>

        <!-- Message Area -->
        <div class="message-area" id="message-area">

          <!-- Chat Header -->
          <div class="chat-header" id="chat-header" style="display:none">
            <button class="back-btn" id="back-btn" aria-label="Back to conversations">
              <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/>
              </svg>
            </button>
            <div class="chat-header-avatar" id="chat-header-avatar">
              <span id="chat-header-avatar-fallback"></span>
            </div>
            <div class="chat-header-info">
              <span class="chat-header-name" id="chat-header-name">Name</span>
              <span class="chat-header-status" id="chat-header-status">
                <span class="online-dot" id="online-dot" aria-hidden="true"></span>
                <span id="online-status-text">Online</span>
              </span>
            </div>
          </div>

          <!-- Empty State -->
          <div class="chat-empty-state" id="chat-empty-state">
            <div class="empty-state-icon">💬</div>
            <h3 class="empty-state-title">No conversation selected</h3>
            <p class="empty-state-text">Pick a conversation from the left panel to start messaging.</p>
          </div>

          <!-- Messages Container -->
          <div id="messages-container" class="messages-container" role="log" aria-live="polite" aria-label="Messages" style="display:none">
            <!-- Messages rendered by JS -->
          </div>

          <!-- Message Input -->
          <div class="message-input-area" id="message-input-area" style="display:none">
            <textarea
              id="message-input"
              class="message-textarea"
              placeholder="Type a message… (Shift+Enter for new line)"
              rows="1"
              aria-label="Message input"
              maxlength="2000"
            ></textarea>
            <button class="send-btn" id="send-btn" aria-label="Send message" type="button">
              <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
              </svg>
            </button>
          </div>

        </div>
      </div>

    </div>
