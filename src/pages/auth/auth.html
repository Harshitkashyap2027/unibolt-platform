<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in or create your UniBolt account" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>UniBolt — Sign In / Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="auth-page">
    <!-- Background -->
    <div class="auth-bg">
      <div class="auth-orb auth-orb-1"></div>
      <div class="auth-orb auth-orb-2"></div>
      <div class="auth-grid"></div>
    </div>

    <!-- Brand Link -->
    <a href="/src/pages/landing/landing.html" class="auth-brand">
      <div class="auth-brand-icon">
        <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
          <polygon points="14,2 6,14 11,14 10,22 18,10 13,10" fill="url(#ab)"/>
          <defs><linearGradient id="ab" x1="6" y1="2" x2="18" y2="22" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>
        </svg>
      </div>
      <span>UniBolt</span>
    </a>

    <!-- Auth Card -->
    <div class="auth-card glass-heavy">
      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" id="tab-login">Sign In</button>
        <button class="auth-tab" data-tab="register" id="tab-register">Register</button>
      </div>

      <!-- ── Login Form ── -->
      <form class="auth-form" id="login-form" novalidate>
        <div class="auth-form-header">
          <h2>Welcome back</h2>
          <p>Sign in to your UniBolt account</p>
        </div>

        <!-- Google Sign-In -->
        <button type="button" class="btn-google" id="google-login-btn">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

        <div class="auth-divider"><span>or continue with email</span></div>

        <div class="form-group">
          <label for="login-email" class="form-label">Email Address</label>
          <div class="input-wrapper input-icon-left">
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
            <input type="email" id="login-email" class="input" placeholder="you@example.com" autocomplete="email" required />
          </div>
          <div class="form-error" id="login-email-error" style="display:none"></div>
        </div>

        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <label for="login-password" class="form-label">Password</label>
            <button type="button" class="forgot-link" id="forgot-password-btn">Forgot password?</button>
          </div>
          <div class="input-wrapper input-icon-left">
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
            <input type="password" id="login-password" class="input" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="input-action" id="toggle-login-password" aria-label="Toggle password visibility">
              <svg id="eye-icon-login" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
            </button>
          </div>
          <div class="form-error" id="login-password-error" style="display:none"></div>
        </div>

        <div class="form-error auth-error" id="login-error" style="display:none"></div>

        <button type="submit" class="btn btn-primary btn-block" id="login-submit-btn">
          Sign In
        </button>

        <p class="auth-switch">
          Don't have an account?
          <button type="button" class="auth-switch-link" data-switch="register">Register free</button>
        </p>
      </form>

      <!-- ── Register Form ── -->
      <form class="auth-form" id="register-form" style="display:none" novalidate>
        <div class="auth-form-header">
          <h2>Create account</h2>
          <p>Join thousands on UniBolt today</p>
        </div>

        <!-- Role Selection -->
        <div class="role-selector" id="role-selector">
          <button type="button" class="role-option active" data-role="student" id="role-student">
            <div class="role-icon">🎓</div>
            <div>
              <strong>Student</strong>
              <span>Find internships & level up</span>
            </div>
            <div class="role-check">
              <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
            </div>
          </button>
          <button type="button" class="role-option" data-role="employer" id="role-employer">
            <div class="role-icon">💼</div>
            <div>
              <strong>Employer</strong>
              <span>Hire exceptional talent</span>
            </div>
            <div class="role-check">
              <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
            </div>
          </button>
        </div>

        <!-- Google Sign-Up -->
        <button type="button" class="btn-google" id="google-register-btn">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

        <div class="auth-divider"><span>or register with email</span></div>

        <div class="form-group">
          <label for="register-name" class="form-label">Full Name</label>
          <div class="input-wrapper input-icon-left">
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
            <input type="text" id="register-name" class="input" placeholder="Rahul Sharma" autocomplete="name" required />
          </div>
          <div class="form-error" id="register-name-error" style="display:none"></div>
        </div>

        <div class="form-group">
          <label for="register-email" class="form-label">Email Address</label>
          <div class="input-wrapper input-icon-left">
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
            <input type="email" id="register-email" class="input" placeholder="you@example.com" autocomplete="email" required />
          </div>
          <div class="form-error" id="register-email-error" style="display:none"></div>
        </div>

        <div class="form-group">
          <label for="register-password" class="form-label">Password</label>
          <div class="input-wrapper input-icon-left">
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
            <input type="password" id="register-password" class="input" placeholder="Min. 8 characters" autocomplete="new-password" required />
            <button type="button" class="input-action" id="toggle-register-password" aria-label="Toggle password visibility">
              <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
            </button>
          </div>
          <div class="password-strength" id="password-strength" style="display:none">
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            <span id="strength-text"></span>
          </div>
          <div class="form-error" id="register-password-error" style="display:none"></div>
        </div>

        <div class="form-error auth-error" id="register-error" style="display:none"></div>

        <button type="submit" class="btn btn-primary btn-block" id="register-submit-btn">
          Create Account
        </button>

        <p class="auth-terms">
          By creating an account, you agree to our
          <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </p>

        <p class="auth-switch">
          Already have an account?
          <button type="button" class="auth-switch-link" data-switch="login">Sign in</button>
        </p>
      </form>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
