<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="UniBolt Leaderboard — See where you rank among your peers." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>UniBolt — Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="leaderboard.css" />
</head>
<body>
  <div class="app-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar" aria-label="Main navigation">
      <a href="#" class="sidebar-logo" aria-label="UniBolt home">
        <div class="sidebar-logo-icon">
          <svg viewBox="0 0 24 24" fill="none" width="20" height="20" aria-hidden="true">
            <polygon points="14,2 6,14 11,14 10,22 18,10 13,10" fill="url(#sb-grad)" />
            <defs>
              <linearGradient id="sb-grad" x1="6" y1="2" x2="18" y2="22" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#6366f1" />
                <stop offset="100%" stop-color="#8b5cf6" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="sidebar-logo-text">UniBolt</span>
      </a>

      <nav class="sidebar-nav" aria-label="Page links">
        <span class="sidebar-section-label">Main</span>

        <a href="../student-dashboard/student-dashboard.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
          </svg>
          Dashboard
        </a>

        <a href="../skill-tree/skill-tree.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/>
          </svg>
          Skill Tree
        </a>

        <a href="../leaderboard/leaderboard.html" class="nav-item active" aria-current="page">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zm6-4a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zm6-3a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/>
          </svg>
          Leaderboard
        </a>

        <a href="../chat/chat.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/>
          </svg>
          Chat
        </a>

        <span class="sidebar-section-label">Account</span>

        <a href="../profile/profile.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
          </svg>
          Profile
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-item nav-item-danger" id="logout-btn" type="button" style="width:100%;border:none;cursor:pointer;background:none">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/>
          </svg>
          Logout
        </button>
      </div>
    </aside>

    <!-- ── Main Area ── -->
    <div class="main-wrapper">

      <!-- Topbar -->
      <header class="topbar" id="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle btn-ghost" id="sidebar-toggle" aria-label="Toggle sidebar" aria-expanded="false">
            <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20" aria-hidden="true">
              <path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/>
            </svg>
          </button>
          <h1 class="topbar-title">Leaderboard</h1>
        </div>
        <div class="topbar-right">
          <button class="topbar-icon-btn" id="notification-btn" aria-label="Notifications">
            <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20" aria-hidden="true">
              <path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zm0 16a2 2 0 01-2-2h4a2 2 0 01-2 2z"/>
            </svg>
            <span class="notification-badge" id="notification-badge" style="display:none"></span>
          </button>
          <button class="topbar-avatar" id="avatar-btn" aria-label="User menu">
            <img src="" alt="User avatar" id="user-avatar" width="32" height="32" />
            <span class="avatar-fallback" id="avatar-fallback" aria-hidden="true">U</span>
          </button>
        </div>
      </header>

      <!-- Main Content -->
      <main class="main-content" id="main-content">

        <!-- Page Header -->
        <div class="page-header reveal">
          <div class="page-header-left">
            <h2 class="page-title">🏆 Leaderboard</h2>
            <p class="page-subtitle">Real-time ELO rankings. Compete, grow, and rise to the top.</p>
          </div>
          <div class="realtime-indicator" aria-live="polite" id="realtime-indicator">
            <span class="realtime-dot" aria-hidden="true"></span>
            <span class="realtime-label">Live</span>
          </div>
        </div>

        <!-- Category Filter Tabs -->
        <div class="filter-tabs reveal" role="tablist" aria-label="Category filter" id="category-tabs">
          <button class="filter-tab active" role="tab" aria-selected="true" data-category="all">🏅 All</button>
          <button class="filter-tab" role="tab" aria-selected="false" data-category="programming">💻 Programming</button>
          <button class="filter-tab" role="tab" aria-selected="false" data-category="data-science">📊 Data Science</button>
          <button class="filter-tab" role="tab" aria-selected="false" data-category="web-dev">🌐 Web Dev</button>
          <button class="filter-tab" role="tab" aria-selected="false" data-category="soft-skills">🤝 Soft Skills</button>
        </div>

        <!-- Podium (Top 3) -->
        <section class="podium-section reveal" aria-labelledby="podium-heading">
          <h3 class="section-heading" id="podium-heading">Top Performers</h3>
          <div id="podium-container" class="podium-container" aria-label="Top 3 players podium">
            <!-- Skeleton -->
            <div class="podium-skeleton">
              <div class="skeleton-podium-card skeleton"></div>
              <div class="skeleton-podium-card skeleton tall"></div>
              <div class="skeleton-podium-card skeleton"></div>
            </div>
          </div>
        </section>

        <!-- Full Table -->
        <section class="table-section reveal" aria-labelledby="table-heading">
          <div class="table-section-header">
            <h3 class="section-heading" id="table-heading">Full Rankings</h3>
            <span class="entry-count" id="entry-count" aria-live="polite"></span>
          </div>
          <div class="table-wrapper">
            <table class="leaderboard-table" id="leaderboard-table" aria-label="Leaderboard rankings">
              <thead>
                <tr>
                  <th scope="col" class="col-rank">Rank</th>
                  <th scope="col" class="col-player">Player</th>
                  <th scope="col" class="col-elo">ELO</th>
                  <th scope="col" class="col-record">W / L / D</th>
                  <th scope="col" class="col-streak">Streak</th>
                  <th scope="col" class="col-badge">Badge</th>
                </tr>
              </thead>
              <tbody id="leaderboard-body" aria-live="polite">
                <!-- Skeleton rows -->
                <tr class="skeleton-row">
                  <td colspan="6"><div class="skeleton skeleton-row-inner"></div></td>
                </tr>
                <tr class="skeleton-row">
                  <td colspan="6"><div class="skeleton skeleton-row-inner"></div></td>
                </tr>
                <tr class="skeleton-row">
                  <td colspan="6"><div class="skeleton skeleton-row-inner"></div></td>
                </tr>
                <tr class="skeleton-row">
                  <td colspan="6"><div class="skeleton skeleton-row-inner"></div></td>
                </tr>
                <tr class="skeleton-row">
                  <td colspan="6"><div class="skeleton skeleton-row-inner"></div></td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

      </main>
    </div>

  </div>

  <script type="module" src="leaderboard.js"></script>
</body>
</html>
